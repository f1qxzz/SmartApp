name: smartlife_app
description: SmartLife - Premium Finance & Chat App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^12.1.3

  # UI & Animation
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9

  # Charts
  fl_chart: ^0.66.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  dio: ^5.7.0
  socket_io_client: ^3.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_dotenv: ^5.1.0
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  csv: ^6.0.0
  google_sign_in: ^6.2.1
  web: ^1.1.1
  record: ^6.2.0
  audioplayers: ^6.6.0
  path: ^1.9.1
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  flutter_timezone: ^4.1.1
  image_cropper: ^12.2.0
  emoji_picker_flutter: ^4.4.0
  swipe_to: ^1.0.6
  file_picker: ^11.0.2
  url_launcher: ^6.3.2
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
 
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21

